@if (!collapsed) {
  <nav class="nav-expanded">
    <button class="navbar-hamburger" type="button" aria-label="Toggle navigation">
      <img class="hamburger"
           src="/assets/menu.svg"
           width="auto" height="26"
           aria-label="Toggle navigation"
           title="Toggle navigation button"
           alt="Toggle navigation button"
           (click)="onToggle()">
    </button>
    <div class="navbar-wrapper" aria-hidden="true">
      <a class="navbar-brand" (click)="onNavigateTo('/')">
        <img ngSrc="/favicon.png" alt="@ks89/angular-modal-gallery brand icon" width="30" height="30" title="@ks89/angular-modal-gallery" />
      </a>
      <ul class="navbar-nav">
        <li class="nav-item {{isNavItemActive('/carousel')}}">
          <a class="nav-link" (click)="onNavigateTo('/carousel')">Carousel</a>
        </li>
        <li class="nav-item {{isNavItemActive('/modal')}}">
          <a class="nav-link" (click)="onNavigateTo('/modal')">Modal gallery</a>
        </li>
        <li class="nav-item {{isNavItemActive('/plain')}}">
          <a class="nav-link" (click)="onNavigateTo('/plain')">Plain Gallery</a>
        </li>
      </ul>
    </div>

    <form id="githubButtons" class="form-inline my-2 my-lg-0">
      <a class="github-badge" href="https://github.com/Ks89">
        <img ngSrc="https://img.shields.io/github/forks/Ks89/angular-modal-gallery.svg?label=Fork&style=social" alt="github social">
      </a>
      <a class="github-badge" href="https://github.com/Ks89/angular-modal-gallery/stargazers">
        <img ngSrc="https://img.shields.io/github/stars/Ks89/angular-modal-gallery.svg?style=social&label=Stars" alt="github stars">
      </a>
      <a class="github-badge" href="https://github.com/Ks89/angular-modal-gallery/network/members">
        <img ngSrc="https://img.shields.io/github/forks/Ks89/angular-modal-gallery.svg?style=social&label=Fork" alt="github forks">
      </a>
      <a class="github-badge" href="https://github.com/Ks89/angular-modal-gallery/watchers">
        <img ngSrc="https://img.shields.io/github/watchers/Ks89/angular-modal-gallery.svg?style=social&label=Watch" alt="github watch">
      </a>
    </form>
  </nav>
} @else {
  <nav class="nav-collapsed">
    <button class="navbar-hamburger" type="button" aria-label="Toggle navigation">
      <img class="hamburger"
           ngSrc="/assets/menu.svg"
           width="26" height="26"
           (click)="onToggle()" alt="menu">
    </button>
    <div class="navbar-wrapper" aria-hidden="true">
      <a class="navbar-brand" (click)="onNavigateTo('/')">&#64;ks89/angular-modal-gallery</a>
      <ul class="navbar-nav">
        <li class="nav-item {{isNavItemActive('/carousel')}}">
          <a class="nav-link" (click)="onNavigateTo('/carousel')">Carousel</a>
        </li>
        <li class="nav-item {{isNavItemActive('/modal')}}">
          <a class="nav-link" (click)="onNavigateTo('/modal')">Modal gallery</a>
        </li>
        <li class="nav-item {{isNavItemActive('/plain')}}">
          <a class="nav-link" (click)="onNavigateTo('/plain')">Plain Gallery</a>
        </li>
      </ul>
    </div>
  </nav>
}
